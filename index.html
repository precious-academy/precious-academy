<!DOCTYPE html>
<html>
<head>
<title>Precious Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ffffff;
}

/* Navbar */
.navbar {
    background: #0B3D91;
    padding: 15px;
    color: white;
    display: flex;
    justify-content: space-between;
}

.navbar button {
    background: gold;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
}

/* Hero */
.hero {
    background: #0B3D91;
    color: white;
    padding: 60px 20px;
    text-align: center;
}

.hero h1 {
    font-size: 32px;
}

/* Sections */
.section {
    padding: 30px;
}

/* Form */
.form-box {
    display: none;
    padding: 20px;
}

input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 90%;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Precious Academy</h2>
    <button onclick="showLogin()">Login</button>
</div>

<div class="hero">
    <h1>Welcome to Precious Academy</h1>
    <p>Shaping the future through quality education</p>
</div>

<div class="section">
    <h2>About Us</h2>
    <p>We provide quality CBC education in a safe and supportive environment.</p>
</div>

<!-- Login Form -->
<div class="form-box" id="loginBox">
    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- Signup Form -->
<div class="form-box" id="signupBox">
    <h3>Sign Up</h3>
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
</div>

<script>
// Firebase config (YOU WILL REPLACE THIS)
var firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

// Show forms
function showLogin() {
    document.getElementById("loginBox").style.display = "block";
}

// Signup
function signup() {
    var email = document.getElementById("signupEmail").value;
    var password = document.getElementById("signupPassword").value;

    firebase.auth().createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
        alert("Account created!");
    })
    .catch((error) => {
        alert(error.message);
    });
}

// Login
function login() {
    var email = document.getElementById("loginEmail").value;
    var password = document.getElementById("loginPassword").value;

    firebase.auth().signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
        alert("Login successful!");
    })
    .catch((error) => {
        alert(error.message);
    });
}
</script>

</body>
</html>
