<script>
// Your Firebase config (UNCHANGED)
var firebaseConfig = {
  apiKey: "AIzaSyB1FbKvbX601BztMYjkP1hNh96JA_R8Elg",
  authDomain: "precious-academy.firebaseapp.com",
  projectId: "precious-academy",
  storageBucket: "precious-academy.firebasestorage.app",
  messagingSenderId: "926568187411",
  appId: "1:926568187411:web:f2bb92e73475493927e1e6"
};

firebase.initializeApp(firebaseConfig);

// Show Login by default
window.onload = function() {
    showLogin();
};

// Show Login
function showLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("signupBox").style.display = "none";
}

// Show Signup
function showSignup() {
    document.getElementById("signupBox").style.display = "block";
    document.getElementById("loginBox").style.display = "none";
}

// Signup with email verification
function signup() {
    var email = document.getElementById("signupEmail").value;
    var password = document.getElementById("signupPassword").value;

    firebase.auth().createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
        userCredential.user.sendEmailVerification();
        alert("Account created! Check your email to verify your account.");
        showLogin();
    })
    .catch((error) => {
        alert(error.message);
    });
}

// Login
function login() {
    var email = document.getElementById("loginEmail").value;
    var password = document.getElementById("loginPassword").value;

    firebase.auth().signInWithEmailAndPassword(email, password)
    .then((userCredential) => {

        // Optional: Check email verification
        if (!userCredential.user.emailVerified) {
            alert("Please verify your email before logging in.");
            return;
        }

        // Redirect to dashboard
        window.location.href = "dashboard.html";
    })
    .catch((error) => {
        alert(error.message);
    });
}
</script>
