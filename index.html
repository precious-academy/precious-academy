<!DOCTYPE html>
<html>
<head>
<title>Login - Precious Academy</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

</head>

<body>

<h2>Login</h2>

<input id="loginEmail" placeholder="Email"><br>
<input id="loginPassword" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<hr>

<h2>Signup</h2>

<input id="signupEmail" placeholder="Email"><br>
<input id="signupPassword" type="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyB1FbKvbX601BztMYjkP1hNh96JA_R8Elg",
  authDomain: "precious-academy.firebaseapp.com",
  projectId: "precious-academy",
  storageBucket: "precious-academy.firebasestorage.app",
  messagingSenderId: "926568187411",
  appId: "1:926568187411:web:f2bb92e73475493927e1e6"
};

firebase.initializeApp(firebaseConfig);

function signup(){
    let email = signupEmail.value;
    let password = signupPassword.value;

    firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(user=>{
        user.user.sendEmailVerification();
        alert("Verify your email first!");
    });
}

function login(){
    let email = loginEmail.value;
    let password = loginPassword.value;

    firebase.auth().signInWithEmailAndPassword(email, password)
    .then(user=>{

        if(!user.user.emailVerified){
            alert("Verify email first!");
            return;
        }

        // ADMIN CHECK
        if(email === "lkodomuk@kabarak.ac.ke"){
            window.location.href = "admin.html";
        } else {
            window.location.href = "dashboard.html";
        }

    })
    .catch(err=>alert(err.message));
}
</script>

</body>
</html>
