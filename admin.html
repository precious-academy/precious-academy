<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Precious Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

.header {
    background: #0B3D91;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <h3>Admin Panel</h3>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

    <div class="card">
        <h3>Add / Update Student</h3>

        <input type="text" id="uid" placeholder="User UID">
        <input type="text" id="name" placeholder="Student Name">
        <input type="text" id="class" placeholder="Class">
        <input type="text" id="admission" placeholder="Admission No">

        <input type="text" id="math" placeholder="Math Grade">
        <input type="text" id="english" placeholder="English Grade">
        <input type="text" id="science" placeholder="Science Grade">

        <input type="number" id="fees" placeholder="Fees Balance">
        <input type="text" id="status" placeholder="Fees Status">

        <button onclick="saveStudent()">Save Student</button>
    </div>

</div>

<script>

// Firebase config
var firebaseConfig = {
  apiKey: "AIzaSyB1FbKvbX601BztMYjkP1hNh96JA_R8Elg",
  authDomain: "precious-academy.firebaseapp.com",
  projectId: "precious-academy",
  storageBucket: "precious-academy.firebasestorage.app",
  messagingSenderId: "926568187411",
  appId: "1:926568187411:web:f2bb92e73475493927e1e6"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

// ONLY YOUR EMAIL IS ALLOWED
const adminEmails = ["lkodomuk@kabarak.ac.ke"];

// AUTH CHECK
firebase.auth().onAuthStateChanged(function(user) {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    if (!adminEmails.includes(user.email)) {
        alert("Access denied. Admin only.");
        window.location.href = "index.html";
        return;
    }

});

// SAVE STUDENT DATA
function saveStudent() {

    let uid = document.getElementById("uid").value;

    if (!uid) {
        alert("Please enter user UID");
        return;
    }

    db.collection("students").doc(uid).set({
        name: document.getElementById("name").value,
        class: document.getElementById("class").value,
        admission: document.getElementById("admission").value,
        math: document.getElementById("math").value,
        english: document.getElementById("english").value,
        science: document.getElementById("science").value,
        fees: document.getElementById("fees").value,
        status: document.getElementById("status").value
    })
    .then(() => {
        alert("Student saved successfully!");
    })
    .catch((error) => {
        alert(error.message);
    });
}

// Logout
function logout() {
    firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
    });
}

</script>

</body>
          </html>
