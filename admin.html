<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

</head>

<body>

<h2>Admin Panel</h2>

<input id="uid" placeholder="Student UID">
<input id="name" placeholder="Name">
<input id="className" placeholder="Class">
<input id="admission" placeholder="Admission">

<input id="math" placeholder="Math">
<input id="english" placeholder="English">
<input id="science" placeholder="Science">

<input id="fees" placeholder="Fees">
<input id="status" placeholder="Status">

<button onclick="save()">Save</button>

<h3>Students</h3>
<div id="list"></div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyB1FbKvbX601BztMYjkP1hNh96JA_R8Elg",
  authDomain: "precious-academy.firebaseapp.com",
  projectId: "precious-academy",
  storageBucket: "precious-academy.firebasestorage.app",
  messagingSenderId: "926568187411",
  appId: "1:926568187411:web:f2bb92e73475493927e1e6"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

const adminEmail = "lkodomuk@kabarak.ac.ke";

firebase.auth().onAuthStateChanged(user=>{
    if(!user || user.email !== adminEmail){
        alert("Access denied");
        window.location.href="index.html";
    }
    load();
});

function save(){
    db.collection("students").doc(uid.value).set({
        name: name.value,
        className: className.value,
        admission: admission.value,
        math: math.value,
        english: english.value,
        science: science.value,
        fees: fees.value,
        status: status.value
    });

    alert("Saved");
    load();
}

function load(){
    list.innerHTML = "";

    db.collection("students").get().then(snap=>{
        snap.forEach(doc=>{
            let d = doc.data();

            list.innerHTML += `
            <div>
                ${d.name} - ${d.className}
                <button onclick="edit('${doc.id}')">Edit</button>
                <button onclick="del('${doc.id}')">Delete</button>
            </div>`;
        });
    });
}

function edit(id){
    db.collection("students").doc(id).get().then(doc=>{
        let d = doc.data();

        uid.value = id;
        name.value = d.name;
        className.value = d.className;
        admission.value = d.admission;
        math.value = d.math;
        english.value = d.english;
        science.value = d.science;
        fees.value = d.fees;
        status.value = d.status;
    });
}

function del(id){
    db.collection("students").doc(id).delete().then(load);
}
</script>

</body>
</html>
