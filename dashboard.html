<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

</head>

<body>

<h2>Student Dashboard</h2>

<p>Email: <span id="email"></span></p>
<p>Name: <span id="name"></span></p>
<p>Class: <span id="className"></span></p>

<p>Math: <span id="math"></span></p>
<p>English: <span id="english"></span></p>
<p>Science: <span id="science"></span></p>

<p>Fees: <span id="fees"></span></p>
<p>Status: <span id="status"></span></p>

<h3>Announcements</h3>
<div id="announcements"></div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyB1FbKvbX601BztMYjkP1hNh96JA_R8Elg",
  authDomain: "precious-academy.firebaseapp.com",
  projectId: "precious-academy",
  storageBucket: "precious-academy.firebasestorage.app",
  messagingSenderId: "926568187411",
  appId: "1:926568187411:web:f2bb92e73475493927e1e6"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{
    if(!user){
        window.location.href="index.html";
        return;
    }

    email.innerText = user.email;

    db.collection("students").doc(user.uid).get().then(doc=>{
        if(doc.exists){
            let d = doc.data();

            name.innerText = d.name;
            className.innerText = d.className;
            math.innerText = d.math;
            english.innerText = d.english;
            science.innerText = d.science;
            fees.innerText = d.fees;
            status.innerText = d.status;
        }
    });

    loadAnnouncements();
});

function loadAnnouncements(){
    db.collection("announcements").get().then(snap=>{
        snap.forEach(doc=>{
            announcements.innerHTML += "<p>"+doc.data().message+"</p>";
        });
    });
}
</script>

</body>
</html>
