<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Precious Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* Header */
.header {
    background: #0B3D91;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header button {
    background: gold;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
}

/* Container */
.container {
    padding: 15px;
}

/* Cards */
.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

@media (max-width: 600px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="header">
    <h3>Precious Academy</h3>
    <div>
        <span id="userEmail">Loading...</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <!-- Student Info -->
    <div class="card">
        <h3>Student Info</h3>
        <p><b>Name:</b> <span id="studentName">Loading...</span></p>
        <p><b>Class:</b> <span id="studentClass">Loading...</span></p>
        <p><b>Admission No:</b> <span id="studentAdmission">Loading...</span></p>
    </div>

    <!-- Grid Sections -->
    <div class="grid">

        <!-- Academic -->
        <div class="card">
            <h3>Subjects & Grades</h3>
            <p>Math: <span id="math"></span></p>
            <p>English: <span id="english"></span></p>
            <p>Science: <span id="science"></span></p>
        </div>

        <!-- Fees -->
        <div class="card">
            <h3>Fees</h3>
            <p><b>Balance:</b> KES <span id="fees"></span></p>
            <p><b>Status:</b> <span id="status"></span></p>
        </div>

    </div>

    <!-- Announcements -->
    <div class="card">
        <h3>Announcements</h3>
        <p>Midterm exams start next week.</p>
        <p>Parents meeting on Friday.</p>
    </div>

</div>

<script>

// Firebase config
var firebaseConfig = {
  apiKey: "AIzaSyB1FbKvbX601BztMYjkP1hNh96JA_R8Elg",
  authDomain: "precious-academy.firebaseapp.com",
  projectId: "precious-academy",
  storageBucket: "precious-academy.firebasestorage.app",
  messagingSenderId: "926568187411",
  appId: "1:926568187411:web:f2bb92e73475493927e1e6"
};

firebase.initializeApp(firebaseConfig);

// Firestore
var db = firebase.firestore();

// AUTH + LOAD DATA
firebase.auth().onAuthStateChanged(function(user) {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    if (!user.emailVerified) {
        alert("Please verify your email first.");
        firebase.auth().signOut();
        window.location.href = "index.html";
        return;
    }

    document.getElementById("userEmail").innerText = user.email;

    // Load student data from Firestore
    db.collection("students").doc(user.uid).get()
    .then((doc) => {

        if (doc.exists) {
            let data = doc.data();

            document.getElementById("studentName").innerText = data.name || "";
            document.getElementById("studentClass").innerText = data.class || "";
            document.getElementById("studentAdmission").innerText = data.admission || "";

            document.getElementById("math").innerText = data.math || "";
            document.getElementById("english").innerText = data.english || "";
            document.getElementById("science").innerText = data.science || "";

            document.getElementById("fees").innerText = data.fees || "0";
            document.getElementById("status").innerText = data.status || "Pending";

        } else {
            console.log("No data found for this user.");
        }

    })
    .catch((error) => {
        console.log(error.message);
    });

});

// Logout
function logout() {
    firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
    });
}

</script>

</body>
</html>
